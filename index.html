<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>דוח בוקר יומי</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #1a1a2e;
        }

        .date {
            font-size: 0.85rem;
            color: #666;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        h1 {
            font-size: 1.6rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #555;
        }

        .section {
            background: #111118;
            border: 1px solid #1a1a2e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.25rem;
        }

        .section h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section h2 .icon {
            font-size: 1.1rem;
        }

        .item {
            padding: 0.6rem 0;
            border-bottom: 1px solid #1a1a2e;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }

        .item-title {
            color: #fff;
            font-weight: 500;
        }

        .item-detail {
            color: #888;
            margin-top: 0.2rem;
        }

        .status {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .status-done { background: #0a2e1a; color: #4ade80; }
        .status-progress { background: #2e2a0a; color: #facc15; }
        .status-todo { background: #1a1a2e; color: #818cf8; }
        .status-alert { background: #2e0a0a; color: #f87171; }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #1a1a2e;
        }

        .metric-row:last-child { border-bottom: none; }

        .metric-label { color: #888; font-size: 0.85rem; }
        .metric-value { color: #fff; font-weight: 600; font-size: 0.95rem; }

        .summary-box {
            background: #0d0d1a;
            border: 1px solid #1a1a2e;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            line-height: 1.6;
            color: #aaa;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #1a1a2e;
            font-size: 0.75rem;
            color: #444;
        }

        @media (max-width: 600px) {
            body { padding: 1rem 0.75rem; }
            .section { padding: 1.25rem; }
            h1 { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="date" id="report-date">--</div>
            <h1>דוח בוקר</h1>
            <div class="subtitle">ABC-TOM System</div>
        </header>

        <div class="section" id="section-overnight">
            <h2><span class="icon">&#127769;</span> מה קרה בלילה</h2>
            <div id="overnight-content">
                <div class="item"><span class="item-detail">אין פעילות לילית</span></div>
            </div>
        </div>

        <div class="section" id="section-projects">
            <h2><span class="icon">&#128204;</span> סטטוס פרויקטים</h2>
            <div id="projects-content">
                <div class="item">
                    <span class="item-detail">אין עדכונים</span>
                </div>
            </div>
        </div>

        <div class="section" id="section-metrics">
            <h2><span class="icon">&#128200;</span> מדדים</h2>
            <div id="metrics-content">
                <div class="metric-row">
                    <span class="metric-label">טריגרים פעילים</span>
                    <span class="metric-value">--</span>
                </div>
            </div>
        </div>

        <div class="section" id="section-today">
            <h2><span class="icon">&#127919;</span> תוכנית להיום</h2>
            <div id="today-content">
                <div class="item"><span class="item-detail">לא הוגדרה תוכנית</span></div>
            </div>
        </div>

        <div class="section" id="section-alerts">
            <h2><span class="icon">&#9888;&#65039;</span> התראות</h2>
            <div id="alerts-content">
                <div class="item"><span class="item-detail">אין התראות</span></div>
            </div>
        </div>

        <footer>
            Generated by Adam &middot; ABC-TOM System
        </footer>
    </div>
</body>
</html>
